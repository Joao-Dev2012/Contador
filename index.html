<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador - ELITI</title>
    <style>
        *{
            margin: 0px;
            box-sizing: border-box;
        }        
        body{
            min-height: 100vh;
            border : 10px solid whitesmoke;
            background-color: rgb(0, 0, 0);
            display: grid;
            place-items: center;
            color: black;
            font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif ;
        }
        button{
            
            border-radius: 30px;
            font-size: 35px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif ;
                }

        section{
            border-radius: 10px;
            text-align: center;
            background: rgb(255, 255, 255);
            padding: 10px;
            height: 500px;
            width: 400px;
        }
        p{
            font-size: 220px;
            font-weight: bold;
            font-family:  'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif ;
        }
    </style>
</head>
<body>
    <section>
        <h2>comic sans talvez de propósito hehe^^</h2>
        <h1>CONTADOR - ELITI</h1>
        <p>0</p>
        <button onclick="diminuir()">-</button>
        <button onclick="aumentar()">+</button>
    </section>
    <script>
        // estado:
        let contador = 0;
        // alteradores:
        function aumentar(){
            contador++
            mostrar()
        }
        function diminuir(){
            contador--
            mostrar()
        }
        // renderizador:
        function mostrar(){
            const p = document.querySelector("p")
            p.innerText = contador
        }
        // inicar
        mostrar()
    </script>
</body>

</html>
