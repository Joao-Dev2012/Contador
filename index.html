<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador - ELITI</title>
    <style>
        *{
            box-sizing: border-box;
            margin: 0;
        }
        body{
            min-height: 100dvh;
            display: grid;
            place-items: center;
            background-color: rgb(34, 10, 47);

        }
        section{
            text-align: center;
            background-color: rgb(38, 4, 69);
            color: white;
            padding: 20px;
            border: 2px solid white;
            border-radius: 15px;
        }
        button{
            background-color: purple;
            border-radius: 20px;
            font-size: 30px;
            padding-left: 10px;
            padding-right: 10px;
            text-align: center;
            color: white;
            border: 1px solid white;
        }
        button.dec{
            padding-left: 15px;
            padding-right: 15px;
        }
        p{
            padding-top: 100px;
            padding-bottom: 100px;
            font-size: 70px;
        }
        h1{
            padding-left: 100px;
            padding-right: 100px;
        }

    </style>
</head>
<body>
        <section>
            <h1>COUNTER</h1>
            <p>0</p>
            <button onclick="diminuir()" class="dec">-</button>
            <button onclick="aumentar()"class="add">+</button>
        </section>
</body>
    <script>
        let valor = 0

        function aumentar(){
            valor++
            render()
        }
        function diminuir(){
            valor--
            render()
        }
        function render(){
            let p = document.querySelector("p")
            p.innerText = valor
        }
        render()

    </script>
</body>

</html>
